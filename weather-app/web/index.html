<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <h1>Weather App</h1>
            <p>Clima actual y comparativo</p>
        </header>

        <section class="input-card">
            <input id="cityInput" type="text" placeholder="Ingrese ciudad (ej: Madrid)" />
            <button id="fetchBtn">Buscar</button>
            <button id="compareBtn">Comparar Múltiples</button>
        </section>

        <section id="weatherCard" class="weather-card hidden"></section>
        <section id="compareResults" class="grid-card"></section>
    </div>

    <script src="app.js"></script>
</body>
</html>
